services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: portfolio-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # PHP-FPM takes time on first boot (composer + npm run build)
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - portfolio

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - portfolio

  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: npg_ifh4JW9mFgsz
      POSTGRES_DB: neondb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - portfolio

  adminer:
    image: adminer:4
    container_name: portfolio-adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - portfolio

volumes:
  pgdata:

networks:
  portfolio:
    driver: bridge
