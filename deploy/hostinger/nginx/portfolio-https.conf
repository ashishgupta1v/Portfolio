server {
    listen 80;
    listen [::]:80;
    server_name ashishgupta.dev www.ashishgupta.dev ashgpt.dev www.ashgpt.dev;

    if ($host ~* ^(ashgpt\.dev|www\.ashgpt\.dev)$) {
        return 301 https://ashishgupta.dev$request_uri;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ashishgupta.dev www.ashishgupta.dev;

    root /var/www/portfolio/current/public;
    index index.php index.html;
    charset utf-8;

    access_log /var/log/nginx/portfolio.access.log;
    error_log /var/log/nginx/portfolio.error.log warn;

    client_max_body_size 16m;

    ssl_certificate /etc/letsencrypt/live/ashishgupta.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashishgupta.dev/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|webp|ico|woff2?|ttf|eot|mp4|webm|glb|gltf|bin)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ashgpt.dev www.ashgpt.dev;

    ssl_certificate /etc/letsencrypt/live/ashishgupta.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashishgupta.dev/privkey.pem;

    return 301 https://ashishgupta.dev$request_uri;
}
